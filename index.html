<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki MindMapper PRO - Mobile Touch</title>
    
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background-color: #121212;
            color: #fff;
        }

        #interface {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(24, 24, 24, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid #333;
            max-width: 300px;
            transition: all 0.3s ease;
        }

        @media (max-width: 600px) {
            #interface {
                left: 10px;
                right: 10px;
                top: 10px;
                max-width: none;
            }
        }

        #interface.minimizado {
            padding: 12px 20px;
        }

        #interface.minimizado .input-group,
        #interface.minimizado #status,
        #interface.minimizado .subtitle {
            display: none !important;
        }

        h1 {
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 5px;
            color: #00adb5;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
        }

        p.subtitle {
            font-size: 0.8rem;
            color: #888;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .input-group input, .input-group button {
            padding: 12px;
            margin: 6px 0;
            display: block;
            width: 100%;
            box-sizing: border-box;
            border-radius: 6px;
            border: 1px solid #444;
            background: #1e1e1e;
            color: #fff;
            font-size: 0.95rem;
        }

        .input-group input:focus {
            border-color: #00adb5;
            outline: none;
        }

        .input-group button.primary {
            background: #00adb5;
            color: #121212;
            cursor: pointer;
            font-weight: bold;
            border: none;
        }

        .input-group button.primary:hover { 
            background: #00f5ff;
        }

        .input-group button.secondary {
            background: #333;
            color: #fff;
            cursor: pointer;
            border: 1px solid #555;
            margin-top: 8px;
        }

        .btn-toggle {
            float: right;
            background: #333;
            border: 1px solid #555;
            color: #00adb5;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: bold;
        }

        #status {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #aaa;
            line-height: 1.4;
            border-top: 1px solid #333;
            padding-top: 12px;
        }

        #network {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div id="interface">
        <button class="btn-toggle" id="btnToggle" onclick="togglePainel()" style="display:none;">Expandir</button>
        <h1>Wiki MindMapper</h1>
        <p class="subtitle">Mapas de Estudo Tácteis</p>
        
        <div class="input-group">
            <input type="text" id="tema" placeholder="Ex: Economia circular">
            <button class="primary" onclick="gerarMapaMentalInicial()">Gerar Mapa Contextual</button>
            <button class="secondary" id="btnPausa" onclick="alternarFisica()" style="display:none;">Pausar Movimento</button>
        </div>
        
        <div id="status">Insere um tema para carregar a árvore filtrada por relevância.</div>
    </div>

    <div id="network"></div>

    <script>
        let nodes, edges, network;
        let nosExpandidos = new Set();
        let paiParaFilhos = {}; 
        let fisicaAtiva = true;

        function eTopicoValido(titulo) {
            if (!titulo) return false;
            const contemApenasNumeros = /^\d+$/.test(titulo);
            const eSeculo = /século/i.test(titulo);
            const contemLista = /lista de/i.test(titulo);
            const eEspecial = /:/.test(titulo); 
            return !contemApenasNumeros && !eSeculo && !contemLista && !eEspecial;
        }

        async function obterLinksRelevantes(titulo) {
            const url = `https://pt.wikipedia.org/w/api.php?action=parse&format=json&page=${encodeURIComponent(titulo)}&prop=text&origin=*`;
            try {
                const resposta = await fetch(url);
                const dados = await resposta.json();
                if (dados.error) return [];
                
                const htmlTexto = dados.parse.text["*"];
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlTexto, 'text/html');
                let linksSelecionados = new Set();

                const elementosTexto = doc.querySelectorAll('p a, li a');
                elementosTexto.forEach(a => {
                    const href = a.getAttribute('href');
                    const title = a.getAttribute('title');
                    if (href && href.startsWith('/wiki/') && title && eTopicoValido(title)) {
                        linksSelecionados.add(title);
                    }
                });

                return Array.from(linksSelecionados);
            } catch (erro) {
                console.error("Erro ao processar HTML:", erro);
                return [];
            }
        }

        function togglePainel() {
            const painel = document.getElementById('interface');
            const btn = document.getElementById('btnToggle');
            if (painel.classList.contains('minimizado')) {
                painel.classList.remove('minimizado');
                btn.innerText = "Recolher";
            } else {
                painel.classList.add('minimizado');
                btn.innerText = "Expandir";
            }
        }

        function alternarFisica() {
            if (!network) return;
            const btn = document.getElementById('btnPausa');
            fisicaAtiva = !fisicaAtiva;
            network.setOptions({ physics: { enabled: fisicaAtiva } });
            btn.innerText = fisicaAtiva ? "Pausar Movimento" : "Ativar Movimento";
            btn.style.borderColor = fisicaAtiva ? "#555" : "#ffb703";
        }

        async function gerarMapaMentalInicial() {
            const temaCentral = document.getElementById('tema').value.trim();
            const statusDiv = document.getElementById('status');
            const btnPausa = document.getElementById('btnPausa');
            const btnToggle = document.getElementById('btnToggle');
            const painel = document.getElementById('interface');

            if (!temaCentral) return alert("Insere um tema!");

            statusDiv.innerHTML = "<strong>A analisar o corpo do texto...</strong>";
            nosExpandidos.clear();
            paiParaFilhos = {};
            fisicaAtiva = true;

            nodes = new vis.DataSet([]);
            edges = new vis.DataSet([]);
            
            nodes.add({ 
                id: temaCentral, 
                label: temaCentral.toUpperCase(), 
                color: { background: '#00adb5', border: '#00f5ff' },
                font: { color: '#ffffff', bold: true, size: 15, face: 'Segoe UI', inherit: false },
                size: 26,
                borderWidth: 3
            });

            nosExpandidos.add(temaCentral.toLowerCase());

            let topicos = await obterLinksRelevantes(temaCentral);
            if (topicos.length === 0) {
                statusDiv.innerHTML = "❌ Artigo não encontrado. Verifica maiúsculas/minúsculas.";
                return;
            }

            let topicosPrincipais = topicos.slice(0, 50);
            statusDiv.innerHTML = `<strong>Rede Criada!</strong> Mapeados ${topicosPrincipais.length} tópicos.`;
            
            painel.classList.add('minimizado');
            btnToggle.innerText = "Expandir";
            btnToggle.style.display = "block";
            btnPausa.style.display = "block";

            paiParaFilhos[temaCentral] = [];

            topicosPrincipais.forEach(topico => {
                nodes.add({ 
                    id: topico, 
                    label: topico,
                    color: { background: '#242424', border: '#444' },
                    font: { color: '#ffffff', size: 12, face: 'Segoe UI', inherit: false },
                    size: 12
                });
                edges.add({ id: `${temaCentral}-${topico}`, from: temaCentral, to: topico });
                paiParaFilhos[temaCentral].push(topico);
            });

            let container = document.getElementById('network');
            let data = { nodes: nodes, edges: edges };
            
            let options = {
                physics: {
                    enabled: true,
                    solver: 'forceAtlas2Based',
                    forceAtlas2Based: { gravitationalConstant: -70, centralGravity: 0.01, springLength: 100, springConstant: 0.08, avoidOverlap: 1 }
                },
                nodes: { shape: 'dot' },
                edges: { color: { color: '#444', opacity: 0.5 }, width: 1.5 }
            };
            
            network = new vis.Network(container, data, options);

            container.addEventListener('contextmenu', e => e.preventDefault());

            // TÁCTIL: Detetar clique longo para RECOLHER (hold)
            network.on("hold", function (params) {
                if (params.nodes.length > 0) {
                    let noClicado = params.nodes[0];
                    let noMinusculo = noClicado.toLowerCase();
                    
                    if (nosExpandidos.has(noMinusculo)) {
                        recolherNo(noClicado);
                        nosExpandidos.delete(noMinusculo);
                        nodes.update({
                            id: noClicado,
                            color: { background: '#242424', border: '#444' },
                            font: { color: '#ffffff', bold: false, size: 12, face: 'Segoe UI', inherit: false } 
                        });
                        statusDiv.innerHTML = `<strong>Nó recolhido:</strong> <em>${noClicado}</em>.`;
                    }
                }
            });

            // TÁCTIL: Detetar clique rápido para EXPANDIR
            network.on("selectNode", async function (params) {
                let noClicado = params.nodes[0];
                let noMinusculo = noClicado.toLowerCase();

                if (nosExpandidos.has(noMinusculo)) return;

                nosExpandidos.add(noMinusculo);
                nodes.update({
                    id: noClicado,
                    color: { background: '#ffb703', border: '#fb8500' },
                    font: { color: '#121212', bold: true, size: 12, face: 'Segoe UI', inherit: false } 
                });

                let subTopicos = await obterLinksRelevantes(noClicado);
                let subTopicosLimitados = subTopicos.slice(0, 12);

                paiParaFilhos[noClicado] = [];

                subTopicosLimitados.forEach(sub => {
                    if (!nodes.get(sub)) {
                        nodes.add({
                            id: sub,
                            label: sub,
                            color: { background: '#1a1a1a', border: '#555' },
                            font: { color: '#ffffff', size: 11, face: 'Segoe UI', inherit: false }, 
                            size: 8
                        });
                    }
                    edges.add({ id: `${noClicado}-${sub}`, from: noClicado, to: sub });
                    paiParaFilhos[noClicado].push(sub);
                });
                
                if (fisicaAtiva) network.stabilize();
            });

            network.on("doubleClick", function (params) {
                if (params.nodes.length > 0) {
                    let noSelecionado = params.nodes[0];
                    window.open(`https://pt.wikipedia.org/wiki/${encodeURIComponent(noSelecionado)}`, '_blank');
                }
            });
        }

        // Função de destruição corrigida e limpa (sem os três pontos)
        function recolherNo(pai) {
            if (!paiParaFilhos[pai]) return;
            paiParaFilhos[pai].forEach(filho => {
                edges.remove(`${pai}-${filho}`);
                let ligacoesRestantes = edges.get({
                    filter: function (edge) { return edge.from === filho || edge.to === filho; }
                });
                if (ligacoesRestantes.length === 0) {
                    if (nosExpandidos.has(filho.toLowerCase())) {
                        recolherNo(filho);
                        nosExpandidos.delete(filho.toLowerCase());
                    }
                    nodes.remove(filho);
                }
            });
            delete paiParaFilhos[pai];
        }
    </script>
</body>
</html>
